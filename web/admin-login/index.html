<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Acceso administrativo — CompAI</title><link rel="icon" type="image/png" href="/icono.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles.css?v=20260703-3"></head>
<body><main class="login-page"><form class="login-card" id="login-form"><div class="brand"><span class="brand-mark official-icon"><img src="/icono.png" alt=""></span><span>CompAI</span></div><span class="eyebrow">ACCESO RESTRINGIDO</span><h1>Panel administrativo</h1><p>Ingresa con las credenciales administrativas configuradas de forma segura.</p><div class="field"><label for="email">CORREO</label><input id="email" type="email" autocomplete="username" required></div><div class="field"><label for="password">CONTRASEÑA</label><input id="password" type="password" autocomplete="current-password" minlength="8" required></div><div class="form-error" id="error" role="alert">Credenciales incorrectas.</div><button class="button primary" id="submit" type="submit">Ingresar</button><a class="login-back" href="/">Volver a CompAI</a></form></main><script src="/config.js?v=20260703-2"></script><script>
const form=document.getElementById('login-form'),error=document.getElementById('error'),submit=document.getElementById('submit');
if(sessionStorage.getItem('compai.admin.token')) location.replace('/admin/');
form.addEventListener('submit',async(e)=>{e.preventDefault();error.classList.remove('show');submit.disabled=true;submit.textContent='Verificando…';try{const response=await fetch(`${window.COMPAI_CONFIG.API_BASE_URL}/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:form.email.value.trim(),password:form.password.value})});if(response.status===401){error.textContent='Correo o contraseña incorrectos.';error.classList.add('show');return}if(!response.ok)throw new Error('server');const data=await response.json();sessionStorage.setItem('compai.admin.token',data.token);location.replace('/admin/')}catch{error.textContent='No se pudo conectar con el servidor. Verifica que el backend esté encendido.';error.classList.add('show')}finally{submit.disabled=false;submit.textContent='Ingresar'}});
</script></body></html>
